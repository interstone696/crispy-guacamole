<h1>Spray Chart Generator v12c</h1>

<section id="inputSection">
  <h2>Paste GameChanger Play-by-Play Below</h2>

  <div id="teamRow">
    <label for="teamName">Team:</label>
    <input id="teamName" type="text" placeholder="e.g. Santa Fe Inferno MD">
    <button type="button" onclick="saveTeamData()">Save Team PBP</button>
    <button type="button" onclick="loadTeamData()">Load Team PBP</button>
    <select id="savedTeamList" onchange="selectSavedTeam()">
      <option value="">Saved teams…</option>
    </select>
    <button type="button" class="secondaryBtn" onclick="deleteSelectedTeam()">Delete Saved Team</button>
  </div>

  <div id="teamRow">
    <button type="button" class="secondaryBtn" onclick="exportTeams()">Export Saved Teams</button>
    <button type="button" class="secondaryBtn" onclick="triggerImport()">Import Saved Teams</button>
    <input type="file" id="importFile" accept=".json,application/json" onchange="importTeams(event)">
  </div>

  <textarea id="pbpInput" placeholder="Paste full GameChanger PBP here..."></textarea>
  <div>
    <button onclick="generateCharts()">Generate Spray Charts</button>
    <button onclick="downloadTeamPDF()">Download Team PDF</button>
  </div>
  <div id="storageNote">
    Saved teams are kept in browser/app storage for quick use. Export Saved Teams creates a JSON backup you can keep in Files.
  </div>
</section>

<div id="chartGrid"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const STORAGE_PREFIX = "sprayChartPBP_";

function normalizeTeamName(rawName) {
  return (rawName || "")
    .toLowerCase()
    .replace(/&/g, " and ")
    .replace(/[^\w\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function getSavedTeamsMap() {
  const teams = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(STORAGE_PREFIX)) {
      const storageKey = key.replace(STORAGE_PREFIX, "");
      let displayName = storageKey;
      const stored = localStorage.getItem(key);
      try {
        const parsed = JSON.parse(stored);
        if (parsed && typeof parsed === "object" && parsed.pbp !== undefined) {
          displayName = parsed.displayName || storageKey;
          teams[storageKey] = parsed;
          continue;
        }
      } catch (e) {
      }
      teams[storageKey] = {
        displayName: displayName,
        pbp: stored || ""
      };
    }
  }
  return teams;
}

function refreshSavedTeamsDropdown() {
  const select = document.getElementById("savedTeamList");
  if (!select) return;
  const teams = getSavedTeamsMap();
  const entries = Object.entries(teams).sort((a, b) =>
    (a[1].displayName || a[0]).localeCompare(b[1].displayName || b[0])
  );

  select.innerHTML = '<option value="">Saved teams…</option>';
  for (const [normalizedKey, info] of entries) {
    const option = document.createElement("option");
    option.value = normalizedKey;
    option.textContent = info.displayName || normalizedKey;
    select.appendChild(option);
  }
}

function getRequestedTeamInfo(showAlertIfBlank = true) {
  const nameInput = document.getElementById("teamName");
  if (!nameInput) return null;

  const rawName = nameInput.value.trim();
  if (!rawName) {
    if (showAlertIfBlank) {
      alert("Type a team name first (e.g. Santa Fe Inferno MD).");
    }
    return null;
  }

  const normalized = normalizeTeamName(rawName);
  if (!normalized) {
    if (showAlertIfBlank) {
      alert("Type a valid team name first.");
    }
    return null;
  }

  return {
    rawName,
    normalized,
    storageKey: STORAGE_PREFIX + normalized
  };
}

function saveTeamData() {
  const info = getRequestedTeamInfo(true);
  if (!info) return;

  const pbpText = document.getElementById("pbpInput").value || "";
  const payload = {
    displayName: info.rawName.replace(/\s+/g, " ").trim(),
    pbp: pbpText
  };
  localStorage.setItem(info.storageKey, JSON.stringify(payload));
  refreshSavedTeamsDropdown();
  document.getElementById("savedTeamList").value = info.normalized;
  alert("Saved PBP for team: " + payload.displayName);
}

function loadTeamData() {
  const info = getRequestedTeamInfo(true);
  if (!info) return;

  const exactKey = info.storageKey;
  let stored = localStorage.getItem(exactKey);
  let matchedKey = info.normalized;

  if (!stored) {
    const teams = getSavedTeamsMap();
    const keys = Object.keys(teams);

    const exactDisplay = keys.find(k => (teams[k].displayName || "").toLowerCase() === info.rawName.toLowerCase());
    if (exactDisplay) {
      stored = localStorage.getItem(STORAGE_PREFIX + exactDisplay);
      matchedKey = exactDisplay;
    }

    if (!stored) {
      const partialMatches = keys.filter(k =>
        k.includes(info.normalized) || info.normalized.includes(k)
      );

      if (partialMatches.length === 1) {
        matchedKey = partialMatches[0];
        stored = localStorage.getItem(STORAGE_PREFIX + matchedKey);
      }
    }
  }

  if (!stored) {
    alert("No saved PBP found for that team yet.");
    refreshSavedTeamsDropdown();
    return;
  }

  let payload;
  try {
    payload = JSON.parse(stored);
  } catch (e) {
    payload = { displayName: matchedKey, pbp: stored };
  }

  document.getElementById("teamName").value = payload.displayName || info.rawName;
  document.getElementById("pbpInput").value = payload.pbp || "";
  refreshSavedTeamsDropdown();
  document.getElementById("savedTeamList").value = matchedKey;
  generateCharts();
}

function selectSavedTeam() {
  const select = document.getElementById("savedTeamList");
  const normalizedKey = select.value;
  if (!normalizedKey) return;

  const stored = localStorage.getItem(STORAGE_PREFIX + normalizedKey);
  if (!stored) return;

  let payload;
  try {
    payload = JSON.parse(stored);
  } catch (e) {
    payload = { displayName: normalizedKey, pbp: stored };
  }

  document.getElementById("teamName").value = payload.displayName || normalizedKey;
}

function deleteSelectedTeam() {
  const select = document.getElementById("savedTeamList");
  const normalizedKey = select.value;
  if (!normalizedKey) {
    alert("Select a saved team first.");
    return;
  }

  const label = select.options[select.selectedIndex]?.textContent || normalizedKey;
  localStorage.removeItem(STORAGE_PREFIX + normalizedKey);
  refreshSavedTeamsDropdown();

  const currentTeam = normalizeTeamName(document.getElementById("teamName").value);
  if (currentTeam === normalizedKey) {
    document.getElementById("teamName").value = "";
    document.getElementById("pbpInput").value = "";
  }

  alert("Deleted saved team: " + label);
}

function exportTeams() {
  const teams = getSavedTeamsMap();
  const blob = new Blob([JSON.stringify(teams, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "spraychart-teams.json";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function triggerImport() {
  const input = document.getElementById("importFile");
  if (input) input.click();
}

function importTeams(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== "object") {
        throw new Error("Invalid file format.");
      }

      for (const [normalizedKey, payload] of Object.entries(data)) {
        const safeKey = normalizeTeamName(normalizedKey);
        if (!safeKey) continue;

        let record = payload;
        if (typeof payload === "string") {
          record = {
            displayName: normalizedKey,
            pbp: payload
          };
        } else {
          record = {
            displayName: (payload.displayName || normalizedKey).trim(),
            pbp: payload.pbp || ""
          };
        }
        localStorage.setItem(STORAGE_PREFIX + safeKey, JSON.stringify(record));
      }

      refreshSavedTeamsDropdown();
      alert("Saved teams imported successfully.");
    } catch (err) {
      alert("Import failed. Please choose a valid spraychart-teams.json file.");
    } finally {
      event.target.value = "";
    }
  };
  reader.readAsText(file);
}

const CANVAS_WIDTH  = 500;
const CANVAS_HEIGHT = 380;

const homeX = CANVAS_WIDTH / 2;
const homeY = CANVAS_HEIGHT - 20;

const outfieldRadius = homeY - 10;
const infieldRadius  = outfieldRadius * 0.6;

const FOUL_CENTER     = -Math.PI / 2;
const FOUL_HALF_ANGLE = 0.85;
const FOUL_LEFT_ANGLE  = FOUL_CENTER - FOUL_HALF_ANGLE;
const FOUL_RIGHT_ANGLE = FOUL_CENTER + FOUL_HALF_ANGLE;

const SLICE_STEP = (FOUL_RIGHT_ANGLE - FOUL_LEFT_ANGLE) / 5;
const ANGLE_LF   = FOUL_LEFT_ANGLE + SLICE_STEP * 0.5;
const ANGLE_LCF  = FOUL_LEFT_ANGLE + SLICE_STEP * 1.5;
const ANGLE_CF   = FOUL_LEFT_ANGLE + SLICE_STEP * 2.5;
const ANGLE_RCF  = FOUL_LEFT_ANGLE + SLICE_STEP * 3.5;
const ANGLE_RF   = FOUL_LEFT_ANGLE + SLICE_STEP * 4.5;

function drawField(ctx) {
  ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

  ctx.beginPath();
  ctx.fillStyle = "#c2f0c2";
  ctx.arc(homeX, homeY, outfieldRadius, FOUL_LEFT_ANGLE, FOUL_RIGHT_ANGLE, false);
  ctx.lineTo(homeX, homeY);
  ctx.fill();

  ctx.beginPath();
  ctx.fillStyle = "#e5c29f";
  ctx.arc(homeX, homeY, infieldRadius, FOUL_LEFT_ANGLE, FOUL_RIGHT_ANGLE, false);
  ctx.lineTo(homeX, homeY);
  ctx.fill();

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  const FOUL_RADIUS = outfieldRadius + 5;

  ctx.beginPath();
  ctx.moveTo(homeX, homeY);
  ctx.lineTo(
    homeX + FOUL_RADIUS * Math.cos(FOUL_LEFT_ANGLE),
    homeY + FOUL_RADIUS * Math.sin(FOUL_LEFT_ANGLE)
  );
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(homeX, homeY);
  ctx.lineTo(
    homeX + FOUL_RADIUS * Math.cos(FOUL_RIGHT_ANGLE),
    homeY + FOUL_RADIUS * Math.sin(FOUL_RIGHT_ANGLE)
  );
  ctx.stroke();

  drawBase(ctx, homeX, homeY);

  const firstBase = {
    x: homeX + infieldRadius * Math.cos(ANGLE_RF),
    y: homeY + infieldRadius * Math.sin(ANGLE_RF)
  };
  const thirdBase = {
    x: homeX + infieldRadius * Math.cos(ANGLE_LF),
    y: homeY + infieldRadius * Math.sin(ANGLE_LF)
  };
  const secondBase = {
    x: homeX + infieldRadius * Math.cos(ANGLE_CF),
    y: homeY + infieldRadius * Math.sin(ANGLE_CF)
  };

  drawBase(ctx, firstBase.x, firstBase.y);
  drawBase(ctx, secondBase.x, secondBase.y);
  drawBase(ctx, thirdBase.x, thirdBase.y);

  ctx.beginPath();
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;

  const pitcherRadius = infieldRadius * 0.5;
  const pitcherX = homeX + pitcherRadius * Math.cos(ANGLE_CF);
  const pitcherY = homeY + pitcherRadius * Math.sin(ANGLE_CF);

  ctx.arc(pitcherX, pitcherY, 14, 0, Math.PI * 2);
  ctx.stroke();
}

function drawBase(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.PI / 4);
  ctx.fillStyle = "white";
  ctx.fillRect(-10, -10, 20, 20);
  ctx.restore();
}

function locToXY(loc, depth, type) {
  const angleMap = {
    "LF":  ANGLE_LF,
    "LCF": ANGLE_LCF,
    "CF":  ANGLE_CF,
    "RCF": ANGLE_RCF,
    "RF":  ANGLE_RF
  };

  const angle = angleMap[loc] || ANGLE_CF;

  let radius;
  if (type === "BUNT") {
    radius = infieldRadius * 0.35;
  } else if (depth === "shallow") {
    radius = infieldRadius + 20;
  } else if (depth === "medium") {
    radius = (infieldRadius + outfieldRadius) / 2;
  } else {
    radius = outfieldRadius * 0.98;
  }

  return {
    x: homeX + radius * Math.cos(angle),
    y: homeY + radius * Math.sin(angle)
  };
}

function drawHitLine(ctx, startX, startY, endX, endY, type) {
  const dx = endX - startX;
  const dy = endY - startY;
  const length = Math.sqrt(dx * dx + dy * dy) || 1;

  const perpX = -dy / length;
  const perpY =  dx / length;

  if (type === "GB") {
    ctx.strokeStyle = "green";
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  else if (type === "LD") {
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  }

  else if (type === "FB") {
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();

    const dx      = endX - startX;
    const dy      = endY - startY;
    const length  = Math.hypot(dx, dy);

    const baseMidX = (startX + endX) / 2;
    const baseMidY = (startY + endY) / 2;

    const bump = Math.min(110, length * 0.45);

    let midX, midY;

    if (Math.abs(dx) < length * 0.15) {
      midX = baseMidX + bump * 0.3;
      midY = baseMidY - bump * 0.2;
    } else {
      midX = baseMidX;
      midY = baseMidY - bump;
    }

    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(midX, midY, endX, endY);
    ctx.stroke();
  }

  else if (type === "BUNT") {
    ctx.strokeStyle = "purple";
    ctx.lineWidth = 4;
    ctx.setLineDash([]);

    const segments  = 30;
    const amplitude = 5;
    const frequency = 3;

    ctx.beginPath();
    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const baseX = startX + dx * t;
      const baseY = startY + dy * t;
      const wiggle = Math.sin(t * Math.PI * frequency) * amplitude;
      const x = baseX + perpX * wiggle;
      const y = baseY + perpY * wiggle;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function extractRoster(pbpText) {
  const roster = [];
  const rosterLines = pbpText.split("\n").filter(l => l.includes(","));

  for (let line of rosterLines) {
    const match = line.match(/^([A-Za-z]+)\s+([A-Za-z]+),\s*(\d+)/);
    if (match) {
      const fullName = match[1] + " " + match[2];
      const number = match[3];
      const abbrev = match[1][0] + match[2][0];

      if (!roster.some(r => r.abbrev === abbrev)) {
        roster.push({ abbrev, fullName, number });
      }
    }
  }
  return roster;
}

function parseHits(pbpText, roster) {
  const hitsByPlayer = {};

  for (let r of roster) hitsByPlayer[r.abbrev] = [];

  const lines = pbpText.split("\n");

  for (let raw of lines) {
    const line = raw.trim();
    if (line.length < 3) continue;

    const lower = line.toLowerCase();

    let abbrev = null;

    let m = line.match(/^([A-Z])\s*([A-Z])\s+/);
    if (m) {
      abbrev = m[1] + m[2];
    } else {
      const m2 = line.match(/^([A-Z]{2})\s+/);
      if (m2) abbrev = m2[1];
    }

    if (!abbrev || !hitsByPlayer[abbrev]) continue;

    let type = null;

    if (lower.includes("bunt"))
      type = "BUNT";
    else if (lower.includes("ground ball") || lower.includes("grounds"))
      type = "GB";
    else if (lower.includes("flies") || lower.includes("fly"))
      type = "FB";
    else if (lower.includes("line drive") || lower.includes("line-drive"))
      type = "LD";

    if (!type) continue;

    let loc = "CF";

    if (lower.includes("left center") || lower.includes("left-center"))
      loc = "LCF";
    else if (lower.includes("right center") || lower.includes("right-center"))
      loc = "RCF";
    else if (lower.includes("left fielder") || lower.includes("left field"))
      loc = "LF";
    else if (lower.includes("right fielder") || lower.includes("right field"))
      loc = "RF";
    else
      loc = "CF";

    let depth = "medium";

    if (lower.includes("shallow"))
      depth = "shallow";
    else if (lower.includes("deep"))
      depth = "deep";

    if (type === "BUNT") depth = "shallow";

    hitsByPlayer[abbrev].push({ type, loc, depth });
  }

  return hitsByPlayer;
}

function generateCharts() {
  const pbpText = document.getElementById("pbpInput").value || "";

  const roster = extractRoster(pbpText);
  const hits = parseHits(pbpText, roster);

  const grid = document.getElementById("chartGrid");
  grid.innerHTML = "";

  for (let r of roster) {
    grid.appendChild(
      buildChartCard(r.fullName, r.number, hits[r.abbrev] || [])
    );
  }

  grid.appendChild(buildBlankChart());
  grid.appendChild(buildBlankChart());
}

function buildChartCard(fullName, number, hitArray) {
  const card = document.createElement("div");
  card.className = "chartCard";

  const title = document.createElement("div");
  title.className = "playerTitle";
  title.textContent = `${fullName}  (#${number})`;
  card.appendChild(title);

  card.appendChild(makeLegend());

  const stats = { LD: 0, GB: 0, FB: 0, BUNT: 0 };
  for (const h of hitArray) {
    if (stats[h.type] !== undefined) {
      stats[h.type]++;
    }
  }
  const total = stats.LD + stats.GB + stats.FB + stats.BUNT;

  const statsDiv = document.createElement("div");
  statsDiv.className = "statsRow";
  statsDiv.textContent =
    `LD: ${stats.LD} | GB: ${stats.GB} | FB: ${stats.FB} | Bunt: ${stats.BUNT} | Total: ${total}`;
  card.appendChild(statsDiv);

  const canvas = document.createElement("canvas");
  canvas.className = "chartCanvas";
  canvas.width = CANVAS_WIDTH;
  canvas.height = CANVAS_HEIGHT;
  card.appendChild(canvas);

  const saveBtn = document.createElement("button");
  saveBtn.textContent = "Save PNG";
  saveBtn.className = "saveBtn";
  saveBtn.onclick = () => saveChartPNG(canvas, fullName);
  card.appendChild(saveBtn);

  const ctx = canvas.getContext("2d");
  drawField(ctx);

  for (let h of hitArray) {
    const end = locToXY(h.loc, h.depth, h.type);
    const contactY = homeY - 6;
    drawHitLine(ctx, homeX, contactY, end.x, end.y, h.type);
  }

  return card;
}

function buildBlankChart() {
  const card = document.createElement("div");
  card.className = "chartCard";

  const underline = document.createElement("div");
  underline.className = "blankUnderline";
  underline.textContent = "__________________________  (#____)";
  card.appendChild(underline);

  const input = document.createElement("input");
  input.className = "editName";
  input.placeholder = "Type Player Name Here...";
  card.appendChild(input);

  card.appendChild(makeLegend());

  const canvas = document.createElement("canvas");
  canvas.className = "chartCanvas";
  canvas.width = CANVAS_WIDTH;
  canvas.height = CANVAS_HEIGHT;
  card.appendChild(canvas);

  const saveBtn = document.createElement("button");
  saveBtn.textContent = "Save PNG";
  saveBtn.className = "saveBtn";
  saveBtn.onclick = () => saveChartPNG(canvas, input.value || "Blank Player");
  card.appendChild(saveBtn);

  const ctx = canvas.getContext("2d");
  drawField(ctx);

  return card;
}

function makeLegend() {
  const box = document.createElement("div");
  box.className = "legendBox";

  box.innerHTML =
    '<div class="legendItem"><div class="legendLine legendLD"></div> Line Drive</div>' +
    '<div class="legendItem"><div class="legendLine legendGB"></div> Ground Ball</div>' +
    '<div class="legendItem"><div class="legendLine legendFB"></div> Fly Ball</div>' +
    '<div class="legendItem"><canvas class="legendBuntCanvas" width="60" height="16"></canvas> Bunt</div>' +
    '<div class="statsRow"></div>';

  const buntCanvas = box.querySelector(".legendBuntCanvas");
  if (buntCanvas) {
    drawLegendBuntLine(buntCanvas);
  }

  return box;
}

function drawLegendBuntLine(canvas) {
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "purple";
  ctx.lineWidth = 4;
  ctx.setLineDash([]);

  const startX = 2;
  const endX   = canvas.width - 2;
  const midY   = canvas.height / 2;
  const dx     = endX - startX;

  const segments  = 30;
  const amplitude = 5;
  const frequency = 3;

  ctx.beginPath();
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;

    const baseX = startX + dx * t;
    const baseY = midY;

    const offsetY = Math.sin(t * Math.PI * frequency) * amplitude;
    const x = baseX;
    const y = baseY + offsetY;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function saveChartPNG(canvas, filename) {
  html2canvas(canvas, { backgroundColor: "#ffffff" }).then((img) => {
    const link = document.createElement("a");
    link.download = filename + "_spraychart.png";
    link.href = img.toDataURL();
    link.click();
  });
}

  grid.innerHTML = "";
